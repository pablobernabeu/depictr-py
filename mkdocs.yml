site_name: depictr (Python)
site_description: A unified, colourblind-safe toolkit for publication-ready statistical visualisation, built on plotnine.
site_url: https://pablobernabeu.github.io/depictr-py/
repo_url: https://github.com/pablobernabeu/depictr-py
# repo_name is left unset so the header shows a compact "GitHub" chip.
# The licence link is absolute: the copyright line renders on every page, and a
# relative link would resolve against nested pages and break.
copyright: >
  <span class="mrd-footer-badges">
  <a href="https://github.com/pablobernabeu/depictr-py/actions/workflows/ci.yml"><img src="https://github.com/pablobernabeu/depictr-py/actions/workflows/ci.yml/badge.svg" alt="CI"></a>
  <a href="https://lifecycle.r-lib.org/articles/stages.html#experimental"><img src="https://img.shields.io/badge/lifecycle-experimental-orange.svg" alt="Lifecycle: experimental"></a>
  <a href="https://opensource.org/license/MIT"><img src="https://img.shields.io/badge/license-MIT-blue.svg" alt="License: MIT"></a>
  </span>
  Developed by <a href="https://pablobernabeu.github.io">Pablo Bernabeu</a> ·
  Released under the
  <a href="https://pablobernabeu.github.io/depictr-py/licence/">MIT licence</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  # Header and footer sit at depictr's deep navy-blue; the accent is coral.
  # primary: black is the closest preset, retuned to the exact colour in
  # stylesheets/brand.css.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/brand.css

plugins:
  - search
  # Runs the gallery example blocks at build time and embeds the rendered
  # plotnine figures inline, like a knitted vignette.
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [".", "docs"]
      check_paths: true

nav:
  - Home: index.md
  - Get started: getting-started.md
  - Reference:
      - Theme, palette and accessibility: reference/theme-and-accessibility.md
      - Exploratory analysis: reference/exploratory.md
      - Estimation and model estimates: reference/estimation-and-models.md
      - Diagnostics: reference/diagnostics.md
      - Classification: reference/classification.md
      - Multivariate, survival and time series: reference/multivariate-survival-timeseries.md
      - Composition and data: reference/composition-and-data.md
  - Gallery:
      - Exploring data: gallery/exploring-data.md
      - Model estimates and diagnostics: gallery/model-estimates.md
      - Classification and survival: gallery/classification-and-survival.md
      - Multivariate and time series: gallery/multivariate-and-time-series.md
      - Accessibility: gallery/accessibility.md
  - The web app: app.md
  - Changelog: changelog.md
  - About: about.md

# The released version shown beside the title in the header (updated on release).
extra:
  version: "0.1.1"
