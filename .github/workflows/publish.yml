# Build and publish a release to PyPI through trusted publishing (OIDC), so no
# API token is ever stored in the repository.
#
# One-time setup on PyPI: in the project's Publishing settings, add this
# repository as a trusted publisher with workflow file "publish.yml" and
# environment "pypi" (the depictr project already exists on PyPI, so this is a
# regular trusted publisher, not a pending one). The workflow runs when a
# GitHub release is published; the manual trigger exists so a release cut
# before this workflow was added can still be shipped from the same commit.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build the sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the distribution
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/depictr/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
